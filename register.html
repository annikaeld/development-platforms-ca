<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Register – The Pink Press</title>
  <link rel="stylesheet" href="css/main.css" />
  <link rel="stylesheet" href="css/auth.css" />
</head>

<body>
  <header>
    <a class="logo-link" href="index.html">
      <img class="logo-img" src="https://github.com/user-attachments/assets/60a0b011-76ce-4116-ba80-51a3637c262a"
        alt="The Pink Press" />
    </a>
  </header>

  <main>
    <div class="auth-card">
      <h1>Join the Press ✦</h1>
      <p class="subtitle">Create an account to publish on The Pink Press</p>

      <form id="register-form" novalidate>
        <div>
          <label for="email">Email</label>
          <input id="email" type="email" placeholder="you@example.com" required autocomplete="email" />
        </div>
        <div>
          <label for="password">Password</label>
          <input id="password" type="password" placeholder="At least 6 characters" required
            autocomplete="new-password" />
          <p class="password-hint">Must be 6–50 characters with at least one uppercase and one lowercase letter.</p>
        </div>
        <div>
          <label for="confirm-password">Confirm Password</label>
          <input id="confirm-password" type="password" placeholder="Repeat your password" required
            autocomplete="new-password" />
        </div>
        <p id="error-msg" aria-live="polite"></p>
        <p id="success-msg" aria-live="polite"></p>
        <button type="submit">Create Account</button>
      </form>

      <hr class="divider" />

      <div class="alt-action">
        Already have an account?
        <a href="login.html">Log in here</a>
      </div>
    </div>
  </main>

  <footer>&copy; The Pink Press &mdash; Barbieland's Daily News</footer>

  <script src="js/auth.js"></script>
  <script src="js/register.js"></script>
</body>

</html>
