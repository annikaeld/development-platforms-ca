<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Log In – The Pink Press</title>
  <link rel="stylesheet" href="css/main.css" />
  <link rel="stylesheet" href="css/auth.css" />
</head>

<body>
  <header>
    <a class="logo-link" href="index.html">
      <img class="logo-img" src="https://github.com/user-attachments/assets/60a0b011-76ce-4116-ba80-51a3637c262a"
        alt="The Pink Press" />
    </a>
  </header>

  <main>
    <div class="auth-card">
      <h1>Welcome back ✦</h1>
      <p class="subtitle">Log in to publish articles on The Pink Press</p>

      <form id="login-form" novalidate>
        <div>
          <label for="email">Email</label>
          <input id="email" type="email" placeholder="you@example.com" required autocomplete="email" />
        </div>
        <div>
          <label for="password">Password</label>
          <input id="password" type="password" placeholder="Your password" required autocomplete="current-password" />
        </div>
        <p id="error-msg" aria-live="polite"></p>
        <button type="submit">Log In</button>
      </form>

      <hr class="divider" />

      <div class="alt-action">
        Don't have an account?
        <a href="register.html">Register here</a>
      </div>
    </div>
  </main>

  <footer>&copy; The Pink Press &mdash; Barbieland's Daily News</footer>

  <script src="js/auth.js"></script>
  <script src="js/login.js"></script>
</body>

</html>
