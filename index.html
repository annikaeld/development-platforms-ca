<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>The Pink Press – Barbieland's Daily News</title>
    <style>
      *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

      body {
        font-family: Georgia, 'Times New Roman', serif;
        background: #fff0f5;
        color: #3a003a;
        min-height: 100vh;
      }

      /* ── Header ── */
      header {
        background: #fff;
        border-bottom: 3px solid #e8006b;
        padding: 12px 24px;
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 16px;
        position: sticky;
        top: 0;
        z-index: 100;
        box-shadow: 0 2px 8px rgba(232, 0, 107, 0.12);
      }

      .logo-link { display: flex; align-items: center; text-decoration: none; }

      .logo-img { height: 70px; object-fit: contain; }

      #user-greeting {
        font-size: 0.85rem;
        color: #c0006a;
        font-style: italic;
      }

      #auth-btn {
        background: #e8006b;
        color: #fff;
        border: none;
        border-radius: 24px;
        padding: 8px 22px;
        font-size: 0.95rem;
        font-family: inherit;
        cursor: pointer;
        transition: background 0.2s;
        white-space: nowrap;
      }
      #auth-btn:hover { background: #b8004f; }

      .header-right {
        display: flex;
        align-items: center;
        gap: 12px;
        flex-shrink: 0;
      }

      /* ── Hero tagline ── */
      .tagline-bar {
        background: #e8006b;
        color: #fff;
        text-align: center;
        padding: 6px 16px;
        font-size: 0.85rem;
        letter-spacing: 1.5px;
        text-transform: uppercase;
      }

      /* ── Main layout ── */
      main {
        max-width: 900px;
        margin: 0 auto;
        padding: 32px 16px 64px;
      }

      /* ── Section headings ── */
      .section-title {
        font-size: 1.4rem;
        color: #e8006b;
        border-bottom: 2px solid #f9b8d4;
        padding-bottom: 8px;
        margin-bottom: 24px;
        letter-spacing: 0.5px;
        text-transform: uppercase;
      }

      /* ── Articles ── */
      #articles-container {
        display: grid;
        grid-template-columns: repeat(auto-fill, minmax(260px, 1fr));
        gap: 24px;
        margin-bottom: 56px;
      }

      .article-card {
        background: #fff;
        border: 1px solid #f9b8d4;
        border-top: 4px solid #e8006b;
        border-radius: 8px;
        padding: 20px;
        box-shadow: 0 2px 8px rgba(232, 0, 107, 0.07);
        display: flex;
        flex-direction: column;
        gap: 10px;
      }

      .article-category {
        display: inline-block;
        background: #fce4ef;
        color: #b8004f;
        font-size: 0.72rem;
        font-weight: bold;
        letter-spacing: 1px;
        text-transform: uppercase;
        padding: 3px 10px;
        border-radius: 12px;
        align-self: flex-start;
      }

      .article-title {
        font-size: 1.1rem;
        color: #3a003a;
        line-height: 1.35;
      }

      .article-body {
        font-size: 0.92rem;
        color: #5a3a5a;
        line-height: 1.6;
        flex: 1;
      }

      .article-meta {
        font-size: 0.75rem;
        color: #c084a0;
        font-style: italic;
        margin-top: auto;
      }

      .loading, .no-articles, .error-text {
        grid-column: 1 / -1;
        text-align: center;
        padding: 40px 0;
        color: #c084a0;
        font-style: italic;
        font-size: 1rem;
      }
      .error-text { color: #e8006b; }

      /* ── Create article section ── */
      #create-section {
        background: #fff;
        border: 1px solid #f9b8d4;
        border-top: 4px solid #e8006b;
        border-radius: 8px;
        padding: 28px 28px 24px;
        box-shadow: 0 2px 8px rgba(232, 0, 107, 0.07);
      }

      #create-form { display: flex; flex-direction: column; gap: 14px; }

      #create-form label {
        font-size: 0.85rem;
        font-weight: bold;
        color: #b8004f;
        margin-bottom: 2px;
        display: block;
      }

      #create-form input,
      #create-form textarea,
      #create-form select {
        width: 100%;
        padding: 10px 14px;
        border: 1px solid #f9b8d4;
        border-radius: 6px;
        font-family: inherit;
        font-size: 0.95rem;
        color: #3a003a;
        background: #fff8fb;
        outline: none;
        transition: border-color 0.2s;
      }

      #create-form input:focus,
      #create-form textarea:focus,
      #create-form select:focus { border-color: #e8006b; }

      #create-form textarea { resize: vertical; min-height: 110px; }

      #create-form button[type="submit"] {
        align-self: flex-start;
        background: #e8006b;
        color: #fff;
        border: none;
        border-radius: 24px;
        padding: 10px 28px;
        font-size: 1rem;
        font-family: inherit;
        cursor: pointer;
        transition: background 0.2s;
      }
      #create-form button[type="submit"]:hover { background: #b8004f; }

      #create-error { color: #e8006b; font-size: 0.88rem; min-height: 1.2em; }
      #create-success { color: #28a745; font-size: 0.88rem; min-height: 1.2em; }

      /* ── Footer ── */
      footer {
        text-align: center;
        padding: 18px;
        font-size: 0.8rem;
        color: #c084a0;
        border-top: 1px solid #f9b8d4;
        background: #fff;
      }
    </style>
  </head>
  <body>
    <header>
      <a class="logo-link" href="index.html">
        <img
          class="logo-img"
          src="https://github.com/user-attachments/assets/60a0b011-76ce-4116-ba80-51a3637c262a"
          alt="The Pink Press"
        />
      </a>
      <div class="header-right">
        <span id="user-greeting"></span>
        <button id="auth-btn">Log In</button>
      </div>
    </header>

    <div class="tagline-bar">✦ Barbieland's Daily News ✦</div>

    <main>
      <h2 class="section-title">Latest Articles</h2>
      <div id="articles-container"></div>

      <section id="create-section" hidden>
        <h2 class="section-title">Publish a New Article</h2>
        <form id="create-form" novalidate>
          <div>
            <label for="post-title">Title</label>
            <input id="post-title" type="text" placeholder="Article headline…" required />
          </div>
          <div>
            <label for="post-category">Category</label>
            <input id="post-category" type="text" placeholder="e.g. Fashion, Entertainment, Politics…" required />
          </div>
          <div>
            <label for="post-body">Body</label>
            <textarea id="post-body" placeholder="Write your article here…" required></textarea>
          </div>
          <p id="create-error" aria-live="polite"></p>
          <p id="create-success" aria-live="polite"></p>
          <button type="submit">✦ Publish</button>
        </form>
      </section>
    </main>

    <footer>
      &copy; The Pink Press &mdash; Barbieland's Daily News
    </footer>

    <script src="js/auth.js"></script>
    <script src="js/posts.js"></script>
  </body>
</html>
