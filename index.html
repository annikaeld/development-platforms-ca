<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>The Pink Press – Barbieland's Daily News</title>
  <link rel="stylesheet" href="css/main.css" />
  <link rel="stylesheet" href="css/index.css" />
</head>

<body>
  <header>
    <a class="logo-link" href="index.html">
      <img class="logo-img" src="https://github.com/user-attachments/assets/60a0b011-76ce-4116-ba80-51a3637c262a"
        alt="The Pink Press" />
    </a>
    <div class="header-right">
      <span id="user-greeting"></span>
      <button id="write-btn" class="write-btn" hidden>✦ Write</button>
      <button id="auth-btn">Log In</button>
    </div>
  </header>

  <div class="tagline-bar">✦ Barbieland's Daily News ✦</div>

  <main>
    <div class="articles-header">
      <h2 class="section-title">Latest Articles</h2>
      <div class="sort-controls">
        <label for="sort-select">Sort by:</label>
        <select id="sort-select">
          <option value="date-desc">Newest first</option>
          <option value="date-asc">Oldest first</option>
          <option value="category-asc">Category (A–Z)</option>
          <option value="category-desc">Category (Z–A)</option>
        </select>
      </div>
    </div>
    <div id="articles-container"></div>
  </main>

  <!-- Create Article Modal -->
  <div id="create-modal" class="modal" hidden>
    <div class="modal-backdrop"></div>
    <div class="modal-content">
      <button class="modal-close" aria-label="Close">&times;</button>
      <h2 class="modal-title">Publish a New Article</h2>
      <form id="create-form" novalidate>
        <div>
          <label for="post-title">Title</label>
          <input id="post-title" type="text" placeholder="Article headline…" required />
        </div>
        <div>
          <label for="post-category">Category</label>
          <input id="post-category" type="text" placeholder="e.g. Fashion, Entertainment, Politics…" required />
        </div>
        <div>
          <label for="post-body">Body</label>
          <textarea id="post-body" placeholder="Write your article here…" required></textarea>
        </div>
        <p id="create-error" aria-live="polite"></p>
        <p id="create-success" aria-live="polite"></p>
        <button type="submit">✦ Publish</button>
      </form>
    </div>
  </div>

  <!-- Article Modal -->
  <div id="article-modal" class="modal" hidden>
    <div class="modal-backdrop"></div>
    <div class="modal-content">
      <button class="modal-close" aria-label="Close">&times;</button>
      <span id="modal-category" class="article-category"></span>
      <h2 id="modal-title" class="modal-title"></h2>
      <p id="modal-body" class="modal-body"></p>
      <p id="modal-meta" class="article-meta"></p>
      <button id="modal-delete-btn" class="delete-btn" hidden>Delete Article</button>
    </div>
  </div>

  <footer>
    &copy; The Pink Press &mdash; Barbieland's Daily News
  </footer>

  <script>
    (function () {
      var isLocal = window.location.protocol === 'file:' ||
        ['localhost', '127.0.0.1'].includes(window.location.hostname);
      window.API_BASE_URL = isLocal ? 'http://localhost:3000' : window.location.origin;
    })();
  </script>
  <script src="js/auth.js"></script>
  <script src="js/posts.js"></script>
</body>

</html>
